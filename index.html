<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美团智能助手 - 极简排程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meituan-shadow { box-shadow: 0 10px 30px -10px rgba(255, 208, 0, 0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative">
        
        <header class="p-6 bg-white rounded-b-[40px] shadow-sm sticky top-0 z-10">
            <h1 class="text-2xl font-black italic text-gray-900 mb-4">Meituan <span class="text-yellow-400">AI</span></h1>
            <div class="flex items-center bg-gray-100 rounded-full px-5 py-3 border-2 border-transparent focus-within:border-yellow-400 transition-all">
                <input type="text" value="理个发，给狗洗澡，然后看场电影" class="bg-transparent border-none outline-none flex-1 text-sm font-medium">
                <div class="bg-yellow-400 p-2 rounded-full shadow-lg cursor-pointer">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-8">
            <section>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold">为您选定最佳方案</h2>
                    <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-1 rounded">基于三里屯核心区</span>
                </div>

                <div class="mb-6">
                    <p class="text-xs font-bold text-gray-400 mb-3 tracking-widest">💇 理发 · HUMAN NEEDED</p>
                    <div class="flex space-x-4 overflow-x-auto pb-2 scrollbar-hide">
                        <div class="flex-shrink-0 w-44 bg-white p-4 rounded-3xl border-4 border-yellow-400 meituan-shadow relative">
                            <div class="absolute top-3 right-3 w-5 h-5 bg-yellow-400 rounded-full flex items-center justify-center">
                                <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            </div>
                            <h3 class="font-bold text-sm">沙宣三里屯店</h3>
                            <div class="flex items-center mt-2">
                                <span class="text-yellow-500 text-xs font-bold">★ 4.8</span>
                                <span class="text-[10px] text-gray-300 ml-2">500m</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 w-44 bg-gray-50 p-4 rounded-3xl border-4 border-transparent opacity-60">
                            <h3 class="font-bold text-sm text-gray-600">托尼形象设计</h3>
                            <div class="flex items-center mt-2">
                                <span class="text-gray-400 text-xs">★ 4.6</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <p class="text-xs font-bold text-gray-400 mb-3 tracking-widest">🐶 宠物洗澡 · BACKGROUND</p>
                    <div class="flex space-x-4 overflow-x-auto pb-2 scrollbar-hide">
                        <div class="flex-shrink-0 w-44 bg-white p-4 rounded-3xl border-4 border-yellow-400 meituan-shadow relative">
                            <div class="absolute top-3 right-3 w-5 h-5 bg-yellow-400 rounded-full flex items-center justify-center">
                                <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                            </div>
                            <h3 class="font-bold text-sm">酷迪宠物店</h3>
                            <div class="flex items-center mt-2">
                                <span class="text-yellow-500 text-xs font-bold">★ 4.9</span>
                                <span class="text-[10px] text-blue-500 ml-2 bg-blue-50 px-1 font-bold">可放下即走</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="pb-10">
                <div class="bg-gray-900 rounded-[40px] p-8 text-white shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h2 class="text-xl font-bold">行程方案</h2>
                            <p class="text-xs text-gray-400 mt-1">AI 优化 · 步行方案</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-yellow-400">14:00</p>
                            <p class="text-[10px] uppercase tracking-widest text-gray-500">出发时间</p>
                        </div>
                    </div>

                    <div class="space-y-8 relative">
                        <div class="absolute left-[11px] top-2 bottom-2 w-[2px] bg-gradient-to-b from-yellow-400 via-blue-400 to-gray-700 opacity-30"></div>

                        <div class="flex items-start relative z-10">
                            <div class="w-6 h-6 bg-yellow-400 rounded-full border-4 border-gray-900 flex-shrink-0"></div>
                            <div class="ml-6">
                                <p class="text-xs text-yellow-400 font-bold">14:05</p>
                                <p class="text-sm font-bold">出发前往 酷迪宠物店</p>
                            </div>
                        </div>

                        <div class="flex items-start relative z-10">
                            <div class="w-6 h-6 bg-blue-400 rounded-full border-4 border-gray-900 flex-shrink-0"></div>
                            <div class="ml-6">
                                <p class="text-xs text-blue-400 font-bold">14:15</p>
                                <p class="text-sm font-bold">放下狗狗 (开始洗澡)</p>
                                <p class="text-[10px] text-gray-500 mt-1">系统已标记：您无需在场等待</p>
                            </div>
                        </div>

                        <div class="flex items-start relative z-10">
                            <div class="w-6 h-6 bg-yellow-400 rounded-full border-4 border-gray-900 flex-shrink-0"></div>
                            <div class="ml-6">
                                <p class="text-xs text-yellow-400 font-bold">14:30</p>
                                <p class="text-sm font-bold">进入 沙宣三里屯店 理发</p>
                                <p class="text-[10px] text-gray-500 mt-1">预计耗时 60 分钟</p>
                            </div>
                        </div>
                    </div>

                    <button class="w-full bg-yellow-400 text-black font-black py-4 rounded-2xl mt-10 hover:scale-95 transition-transform">
                        一键导航全部行程
                    </button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
