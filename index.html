<script>
// ======================================================================
// 美团 AI 助手 — 前端交互逻辑
// 不修改 HTML 骨架，只动态渲染数据
// ======================================================================

const API_BASE = '';

// --- DOM 引用 ---
const searchInput = document.querySelector('header input[type="text"]');
const searchBtn = document.querySelector('header .rounded-full + div, header .bg-yellow-400');
const mainEl = document.getElementById('dynamic-content');

// 首屏原始内容（硬编码示例），用户输入后会被动态替换
let firstRun = true;

// --- 自动滚动 ---
var userScrolledUp = false;
var scrollContainer = document.querySelector('main');

function scrollToBottom() {
 if (userScrolledUp) return;
 if (!scrollContainer) scrollContainer = document.querySelector('main');
 requestAnimationFrame(function() {
 scrollContainer.scrollTop = scrollContainer.scrollHeight;
 });
}

// 监测手动上滑
if (scrollContainer) {
 scrollContainer.addEventListener('scroll', function() {
 var th = 60;
 var atBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop - scrollContainer.clientHeight < th;
 if (!atBottom && scrollContainer.scrollTop > 0) {
 userScrolledUp = true;
 } else if (atBottom) {
 userScrolledUp = false;
 }
 });
}

// --- 状态 ---
let currentPhase = 'init';
let selectedTransport = '步行';

// --- 品类 emoji 映射 ---
const CATEGORY_EMOJI = {
 hair: '💇', pet: '🐶', cafe: '☕',
 restaurant: '🍽️', cinema: '🎬', gym: '💪', laundry: '🧺',
};
const CATEGORY_NAME = {
 hair: '理发', pet: '宠物洗澡', cafe: '咖啡',
 restaurant: '餐饮', cinema: '电影', gym: '健身', laundry: '干洗',
};

// ======================================================================
// 交通时间计算工具
// ======================================================================

/** 交通方式速度(m/min)及额外等候时间(min) */
/* 常数与后端 concurrent_pipeline_scheduler.py 严格对齐 */
var TRANSPORT_SPEED = {
  '步行': 80,
  '公共交通': 250,        // 公交车平均速度
  '地铁': 500,             // 地铁行驶速度
  '打车': 400,
  '驾车': 500,
};
var TRANSPORT_WAIT = {
  '步行': 0,
  '公共交通': 5,           // 步行到公交站+等车
  '地铁': 5,               // 步行到地铁站+等车+出站
  '打车': 5,               // 叫车等待+启动
  '驾车': 5,               // 启动汽车+停车
};

/** 从距离字符串(如 "200m" / "1.2km")解析米数 */
function parseDistanceMeters(distStr) {
  if (!distStr) return 0;
  var m = distStr.match(/^([\d.]+)(m|km)$/);
  if (!m) return 0;
  var val = parseFloat(m[1]);
  if (m[2] === 'km') return Math.round(val * 1000);
  return Math.round(val);
}

/** 计算某种交通方式的预计用时（分钟），含等车时间 */
function calcTransportMinutes(distanceMeters, mode) {
  if (!distanceMeters || distanceMeters <= 0) return 0;
  var speed = TRANSPORT_SPEED[mode] || 80;
  var wait = TRANSPORT_WAIT[mode] || 0;
  return Math.ceil(distanceMeters / speed) + wait;
}

/** 获取当前所有已选店铺的平均距离（m） */
function getAvgSelectedDistanceMeters() {
  var cards = document.querySelectorAll('.shop-card.border-yellow-400');
  if (!cards.length) return 0;
  var total = 0, count = 0;
  cards.forEach(function(c) {
    // shop-card 结构: h3(名称) + div > span(评分) + span(距离)
    // 距离 span 是文本类似 "200m" 或 "1.2km"，直接遍历 card 的文本节点找
    var allSpans = c.querySelectorAll('span');
    var found = false;
    allSpans.forEach(function(sp) {
      var txt = sp.textContent.trim();
      if (/^[\d.]+(m|km)$/.test(txt)) {
        var distM = parseDistanceMeters(txt);
        if (distM > 0) { total += distM; count++; found = true; }
      }
    });
  });
  if (!count) return 0;
  return Math.round(total / count);
}

/** 更新所有交通方式的时间标签 */
function updateTransportTimeLabels() {
  var avgDist = getAvgSelectedDistanceMeters();
  if (avgDist <= 0) {
    // 无数据时显示占位
    ['步行','公共交通','打车','驾车'].forEach(function(m) {
      var el = document.getElementById('time-label-' + m);
      if (el) el.textContent = '';
    });
    return;
  }
  ['步行','公共交通','打车','驾车'].forEach(function(m) {
    var el = document.getElementById('time-label-' + m);
    if (!el) return;
    var min = calcTransportMinutes(avgDist, m);
    el.textContent = '约 ' + min + ' 分钟';
  });
}

function renderSchedule(data) {

 let html = `

 <div class="flex justify-between items-center mb-8">
 <div>

 </div>

 <div class="space-y-8 relative">
 <div class="absolute left-[11px] top-2 bottom-2 w-[2px] bg-gradient-to-b from-yellow-400 via-blue-400 to-gray-700 opacity-30"></div>
 `;

 // 后端action→真人化文案映射
 const actionLabels = {
 'DEPART': '准备出发',
 'MOVE_AND_EXEC': '', // 从 memo 提取
 'MOVE': '', // 从 memo 提取
 'DROP_TASK': '', // 由 MOVE 合并
 'START_TASK': '', // 由 MOVE 合并
 'PICK_TASK': '取回',
 'WAIT': '等待中',
 'ARRIVE': '到达',
 };

 // 提取店铺名
 function shopName(memo) {
 if (!memo) return '';
 // 匹配 "前往 xxx" 或 "前往执行 xxx" 或 "完成回收: xxx"
 let m = memo.match(/前往(?:执行)?\s*(.+?)(?: —.*)?$/);
 if (m) return m[1];
 m = memo.match(/完成回收:\s*(.+)/);
 if (m) return m[1];
 m = memo.match(/放下物品/);
 if (m) return '← ';
 return memo;
 }

 for (let i = 0; i < data.timeline.length; i++) {
 const item = data.timeline[i];
 let dotColor = 'bg-yellow-400';
 let label = '';
 let subHtml = '';

 if (item.action === 'DEPART') {
 label = '出发';
 dotColor = 'bg-yellow-400';
 } else if (item.action === 'MOVE' || item.action === 'MOVE_AND_EXEC') {
   var name = shopName(item.memo);
   var hasDrop = item.memo && item.memo.includes('放下');
   var hasStart = item.memo && item.memo.includes('人在场');
   var hasPick = item.memo && item.memo.includes('回收');
   if (hasDrop) {
     label = '去 ' + name;
     dotColor = 'bg-blue-400';
   } else if (hasPick) {
     label = '取回 ' + name;
     dotColor = 'bg-green-400';
   } else {
     label = '前往 ' + name;
     dotColor = 'bg-indigo-400';
   }
   // 子任务行
   if (item.sub_task) {
     var endTime = '';
     if (item.time && item.sub_task.duration_minutes) {
       var parts = item.time.split(':');
       if (parts.length === 2) {
         var h = parseInt(parts[0]), m = parseInt(parts[1]);
         m += item.sub_task.duration_minutes;
         h += Math.floor(m / 60);
         m = m % 60;
         endTime = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
       }
     }
     subHtml = '<p class="text-xs text-gray-400 mt-1 flex justify-between"><span>── 进行' + item.sub_task.action + '（预计 ' + item.sub_task.duration_minutes + ' 分钟）</span><span class="text-gray-500">' + endTime + ' 结束</span></p>';
   }
 } else if (item.action === 'PICK_TASK') {
   var name = shopName(item.memo);
   label = '去 ' + name + ' 接回宠物';
   dotColor = 'bg-green-400';
 } else if (item.action === 'WAIT') {
   label = '等待中';
   dotColor = 'bg-blue-400';
 } else {
   label = item.memo || '';
   if (item.action === 'DROP_TASK' || item.action === 'WAIT') dotColor = 'bg-blue-400';
   else if (item.action === 'PICK_TASK') dotColor = 'bg-green-400';
 }

 html += `

 if (scheduleSection) scheduleSection.innerHTML = html;
 else {

 dc.insertAdjacentHTML('beforeend', html);
 }

 currentPhase = 'done';

/**
 * 渲染二级弹窗
 * @param {string} title    弹窗标题
 * @param {string} hint     提示文案
 * @param {Array}  options  [{ value, emoji, title, subtitle }, ...]
 * @param {function} onConfirm(selectedValue, selectedName)  确认回调
 */
function showSecondModal(title, hint, options, onConfirm) {
  secondModalSelectedValue = null;
  secondModalSelectedName = null;
  secondModalCallback = onConfirm;
  document.getElementById('second-modal-title').textContent = title;
  document.getElementById('second-modal-hint').textContent = hint;
  document.getElementById('second-modal-body').innerHTML =
    options.map(function(o, i) {
      var selectedAttr = (i === 0) ? ' border-yellow-400 bg-yellow-50' : ' border-gray-200 bg-gray-50';
      if (i === 0) {
        secondModalSelectedValue = o.value;
        secondModalSelectedName = o.title;
      }
      return '<div class="second-option rounded-2xl p-3 cursor-pointer hover:border-yellow-400 hover:bg-yellow-50 transition flex items-center gap-3 border' + selectedAttr + '" data-value="' + o.value + '" data-name="' + o.title + '" onclick="selectSecondOption(this)">' +
        '<div class="w-9 h-9 bg-gray-200 rounded-full flex items-center justify-center flex-shrink-0 text-base">' + o.emoji + '</div>' +
        '<div class="min-w-0 flex-1">' +
        '<p class="text-sm font-bold text-gray-900">' + o.title + '</p>' +
        (o.subtitle ? '<p class="text-xs text-gray-500 mt-0.5">' + o.subtitle + '</p>' : '') +
        '</div></div>';
    }).join('');
  // 如果是延后弹窗，在最后追加自定义输入区（隐藏）
  var hasCustom = options.some(function(o) { return o.value === 'custom'; });
  var body = document.getElementById('second-modal-body');
  if (hasCustom) {
    var inputDiv = document.createElement('div');
    inputDiv.id = 'custom-delay-input-wrap';
    inputDiv.className = 'hidden mt-2';
    inputDiv.innerHTML = '<div class="bg-gray-50 rounded-2xl p-3 flex items-center gap-2 border border-gray-200">' +
      '<span class="text-sm text-gray-600">⏱️ 分钟:</span>' +
      '<input id="custom-delay-input" type="number" min="1" max="999" value="45" class="flex-1 bg-white rounded-full px-4 py-2 text-sm border border-gray-200 outline-none focus:border-yellow-400">' +
      '</div>';
    body.appendChild(inputDiv);
  }
  // 默认选中第一个
  document.getElementById('second-modal-confirm').disabled = false;
  document.getElementById('planb-second-modal').classList.remove('hidden');
}

function selectSecondOption(el) {
  document.querySelectorAll('.second-option').forEach(function(o) {
    o.classList.remove('border-yellow-400', 'bg-yellow-50');
    o.classList.add('border-gray-200', 'bg-gray-50');

  secondModalSelectedName = el.dataset.name;

  var wrap = document.getElementById('custom-delay-input-wrap');

    wrap.classList.toggle('hidden', el.dataset.value !== 'custom');

};

function confirmSecondModal() {
  if (!secondModalSelectedValue) return;
  document.getElementById('planb-second-modal').classList.add('hidden');

var _detailAnimating = false;

function openShopDetail(event, cardEl) {
  if (_detailAnimating) return;
  _detailAnimating = true;

  // 获取卡片上的数据
  var shopId = cardEl.dataset.shopId;
  var category = cardEl.dataset.category;
  var name = cardEl.querySelector('h3') ? cardEl.querySelector('h3').textContent.trim() : '';
  var rating = '';
  var distance = '';
  var spans = cardEl.querySelectorAll('span');
  spans.forEach(function(sp) {
    var txt = sp.textContent.trim();
    if (txt.startsWith('★')) rating = txt;
    if (/^[\d.]+(m|km)$/.test(txt)) distance = txt;
  });

  // 获取详情数据（从 window.shopDetailData 或异步请求）
  // 先走异步请求获取完整数据
  fetch(API_BASE + '/api/shop_detail', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({shop_id: shopId})
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { _detailAnimating = false; return; }

    // 填充弹窗
    document.getElementById('detail-shop-name').textContent = data.name || name;
    document.getElementById('detail-shop-rating').textContent = rating || ('★ ' + data.rating);
    document.getElementById('detail-shop-distance').textContent = distance;
    document.getElementById('detail-shop-category').textContent = category;
    document.getElementById('detail-shop-phone').textContent = data.phone || '暂无';
    document.getElementById('detail-shop-address').textContent = data.address || '暂无';

    // 招牌菜
    var dishHtml = '';
    (data.signature_dishes || []).forEach(function(d) {
      dishHtml += '<div class="flex items-center gap-3 bg-gray-50 rounded-2xl p-3">' +
        '<div class="w-14 h-14 bg-gray-200 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl">'+ (d.image_url ? '<img src="'+d.image_url+'" class="w-full h-full object-cover rounded-2xl">' : '🍽️') +'</div>' +
        '<div><p class="text-sm font-bold text-gray-800">'+d.name+'</p><p class="text-xs text-gray-500">'+d.price+'</p></div>' +
        '</div>';
    });
    if (!dishHtml) dishHtml = '<p class="text-sm text-gray-400">暂无招牌推荐</p>';
    document.getElementById('detail-dishes').innerHTML = dishHtml;

    // 评价
    var cmtHtml = '';
    (data.top_comments || []).forEach(function(c) {
      var stars = '';
      for (var s = 0; s < Math.round(c.rating); s++) stars += '⭐';
      cmtHtml += '<div class="bg-gray-50 rounded-2xl p-3"><div class="flex items-center justify-between"><p class="text-xs font-bold text-gray-700">'+c.user+'</p><span class="text-[10px]">'+stars+'</span></div><p class="text-xs text-gray-500 mt-1">"'+c.text+'"</p></div>';
    });
    if (!cmtHtml) cmtHtml = '<p class="text-sm text-gray-400">暂无评价</p>';
    document.getElementById('detail-comments').innerHTML = cmtHtml;

    // 放大过渡动画
    var overlay = document.getElementById('shop-detail-overlay');
    var card = document.getElementById('shop-detail-card');
    var rect = cardEl.getBoundingClientRect();

    overlay.classList.remove('hidden');
    // 先把卡片缩放到卡片位置
    card.style.transition = 'none';
    card.style.transformOrigin = '0 0';
    card.style.position = 'fixed';
    card.style.top = rect.top + 'px';
    card.style.left = rect.left + 'px';
    card.style.width = rect.width + 'px';
    card.style.margin = '0';
    card.style.borderRadius = '24px';

    // 强制重排后过渡到全屏中央
    card.offsetHeight;
    card.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
    card.style.top = '50%';
    card.style.left = '50%';
    card.style.transform = 'translate(-50%, -50%)';
    card.style.width = 'calc(100% - 32px)';
    card.style.maxWidth = '24rem';
    card.style.borderRadius = '32px';

    _detailAnimating = false;
  }).catch(function() {

  });

/**
 * 核心 Plan B 执行函数
 */
function executePlanB() {
  if (!pendingDemoException || !selectedPlanBOption) return;

  var exType = pendingDemoException.type;
  var optId = selectedPlanBOption;
  var optionLabel = document.querySelector('.planb-option.border-yellow-400 .text-sm.font-bold');
  var label = optionLabel ? optionLabel.textContent : optId;

  // ---- 1. 打车类：切换交通方式 ----
  if (optId === 'switch_to_taxi') {
    selectedTransport = '打车';
    document.querySelectorAll('.transport-option').forEach(function(o) {
      if (o.dataset.transport === '打车') {
        o.className = 'transport-option selected bg-yellow-400 text-black font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:scale-95 transition-transform flex flex-col items-center';
      } else {
        o.className = 'transport-option bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:bg-gray-300 transition flex flex-col items-center';
      }
    });
    activeExceptions.push({ ...pendingDemoException });
    renderActiveExceptions();
    appendExecChatMessage('已为您将后续所有路段切换为 <b>打车</b> 接驳 🚕，将以更快的速度到达各目的地。');
    closeDemoExceptionModal();
    return;
  }

  // ---- 2. 避雨：插入 cafe 为首个目的地 ----
  if (optId === 'find_shelter') {
    activeExceptions.push({ ...pendingDemoException });
    renderActiveExceptions();
    closeDemoExceptionModal();
    fetch(API_BASE + '/api/insert_shelter', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'}
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var name = data.shelter_name || '附近饮品店';
      appendExecChatMessage('为您添加了避雨点 <b>' + name + '</b> ☕，已安排为行程第一个目的地。请等雨势减弱后再出发前往后续节点。');
      if (data.timeline) {
        renderSchedule(data);
      }
    })
    .catch(function() {
      appendExecChatMessage('已为您找到最近咖啡店避雨 ☕，已加入行程第一站。');
    });
    return;
  }

  // ---- 3. 取消节点 / 取消计划 ----
  if (optId === 'cancel_node' || optId === 'cancel_trip') {
    activeExceptions.push({ ...pendingDemoException });
    renderActiveExceptions();
    var msg = '';
    if (optId === 'cancel_node') {
      msg = '已将异常节点 <b>从行程中移除</b> ❌，请确认剩余行程是否满足需求。';
    } else {
      msg = '已为您 <b>取消本次行程计划</b>，如需重新规划请随时告诉我。';
      execContentCache = '';
      document.getElementById('exec-plan-content').innerHTML = '';
    }
    appendExecChatMessage(msg);
    closeDemoExceptionModal();
    return;
  }

  // ---- 4. 延后类 ----
  if (optId === 'postpone' || optId === 'postpone_departure') {
    showSecondModal(
      '⏳ 延后多长时间？',
      '请选择延时时长，系统将重新排程',
      [
        { value: '15', emoji: '⏱️', title: '15 分钟' },
        { value: '30', emoji: '⏱️', title: '30 分钟' },
        { value: '60', emoji: '⏱️', title: '1 小时' },
        { value: 'custom', emoji: '✏️', title: '自定义', subtitle: '输入具体分钟数' }
      ],
      function(delayVal) {
        activeExceptions.push({ ...pendingDemoException });
        renderActiveExceptions();
        appendExecChatMessage('已延后相关任务 ⏳，将重新排程确保整体行程尽量不受影响。（延后 ' + delayVal + ' 分钟）');
        closeDemoExceptionModal();
      }
    );
    return;
  }

  // ---- 5. 堵车 → 改步行/地铁接驳 ----
  if (optId === 'switch_to_walk_metro') {
    // 根据已选店铺平均距离计算各接驳方式预计用时
    var avgDist = getAvgSelectedDistanceMeters();
    var secondOpts = [
      { value: 'walk', emoji: '🚶', title: '全程步行', subtitle: '' },
      { value: 'metro', emoji: '🚇', title: '步行至地铁站', subtitle: '' },
      { value: 'walk_bus', emoji: '🚌', title: '步行+公交混合', subtitle: '' }
    ];
    // 用不同的速度近似模拟三种模式
    var modeSpeedMap = { walk: 80, metro: 300, walk_bus: 180 };
    secondOpts.forEach(function(o) {
      var speed = modeSpeedMap[o.value] || 80;
      var mins = Math.ceil(avgDist / speed);
      o.subtitle = '约 ' + mins + ' 分钟';
    });
    showSecondModal(
      '🚶 请选择接驳方式',
      '堵车路段切换为非驾车出行',
      secondOpts,
      function(secondVal) {
        var transportMap = { walk: '步行', metro: '地铁', walk_bus: '步行+公交' };
        var tLabel = transportMap[secondVal] || '步行';
        selectedTransport = tLabel;
        activeExceptions.push({ ...pendingDemoException });
        renderActiveExceptions();
        appendExecChatMessage('📢 堵车预警·已为您切换为 <b>' + tLabel + '</b> 接驳方式，避开拥堵路段。');
        closeDemoExceptionModal();
      }
    );
    return;
  }

  // ---- 6. 排号异常→换店+排号（swap_shop_and_queue）or 停电→换店（swap_shop）----
  if (optId === 'swap_shop_and_queue' || optId === 'swap_shop') {
    var isQueue = (optId === 'swap_shop_and_queue');
    closeDemoExceptionModal();
    fetch(API_BASE + '/api/get_swap_candidates', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ anomaly_type: exType })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error || !data.shops || data.shops.length === 0) {
        appendExecChatMessage('抱歉，附近未找到可替换的同品类店铺。建议取消该节点或延后处理。');
        return;
      }
      var shopOpts = data.shops.map(function(s, i) {
        return {
          value: s.shop_id,
          emoji: '🏪',
          title: s.name,
          subtitle: '★' + s.rating + '  ' + (s.distance || '')
        };
      });
      showSecondModal(
        isQueue ? '🔄 选择替换店铺（自动排号）' : '🔄 选择替换餐厅',
        '已排除异常店，请从同品类中选择替代：',
        shopOpts,
        function(swapShopId, swapShopName) {
          activeExceptions.push({ ...pendingDemoException });
          renderActiveExceptions();
          fetch(API_BASE + '/api/swap_shop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ new_shop_id: swapShopId, is_queue: isQueue })
          })
          .then(function(r) { return r.json(); })
          .then(function(swapRes) {
            var extraMsg = isQueue ? '，已自动为您 <b>一键排号</b> 🎫' : '';
            appendExecChatMessage('已将异常店铺替换为 <b>' + (swapShopName || '新店铺') + '</b>' + extraMsg + '，行程已更新。');
            if (swapRes.timeline) {
              renderSchedule(swapRes);
            }
          })
          .catch(function() {
            appendExecChatMessage('替换店铺失败，请稍后重试。');
          });
        }
      );
    })
    .catch(function() {
      appendExecChatMessage('获取可替换店铺列表失败，请稍后重试。');
    });
    return;
  }

  // ---- 7. 重新规划路线绕行 ----
  if (optId === 'reroute') {
    activeExceptions.push({ ...pendingDemoException });
    renderActiveExceptions();
    appendExecChatMessage('📢 正在为您重新规划绕行路线，避开拥堵路段 🗺️，请稍候。');
    closeDemoExceptionModal();
    return;
  }

  // ---- 默认兜底 ----
  activeExceptions.push({ ...pendingDemoException });
  renderActiveExceptions();
  appendExecChatMessage('已执行操作: ' + label);
  closeDemoExceptionModal();
}

function renderActiveExceptions() {
 const listContainer = document.getElementById('active-exceptions-list');
 if (!listContainer) return;

 if (activeExceptions.length === 0) {
 listContainer.innerHTML = '<p class="text-gray-500 italic py-2 text-center">暂无激活的模拟干扰项</p>';
 return;
 }

 listContainer.innerHTML = '';
 activeExceptions.forEach(exc => {
 const div = document.createElement('div');
 div.className = 'bg-red-950/40 border border-red-900/60 text-red-200 p-2.5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-red-900/40 transition group relative';
 div.title = '点击撤销该环境异常';
 div.onclick = () => removeActiveException(exc.id);
 div.innerHTML = `
 <div class="min-w-0 flex-1 pr-2">
 <div class="flex items-center gap-1">
 <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
 <p class="font-bold text-[11px] text-red-300 truncate">${exc.type}</p>
 </div>
 <p class="text-[10px] text-gray-400 truncate mt-0.5 opacity-80">${exc.scope.split(' ')[0]}</p>
 </div>
 <span class="text-gray-500 group-hover:text-red-400 font-bold transition text-xs pl-1 select-none">✕</span>
 `;
 listContainer.appendChild(div);
 });
}

function removeActiveException(id) {
 activeExceptions = activeExceptions.filter(exc => exc.id !== id);
 renderActiveExceptions();
 alert('异常环境干扰已清除，行程重新对齐美团原生规划航线。');
}

// ======================================================================
// 初始化
// ======================================================================
// 虚拟时钟状态与主控开关
// ======================================================================

let clockPowerOn = false;  // 默认关闭（采用真实时间）
let clockCurrentSpeed = 1;  // 当前倍率，默认 1x（每秒 1 虚拟分钟）

function clockTogglePower() {
  clockPowerOn = !clockPowerOn;
  const knob = document.getElementById('clock-power-knob');
  const btn = document.getElementById('clock-power-btn');
  const body = document.getElementById('clock-panel-body');
  const display = document.getElementById('clock-display');
  const playBtn = document.getElementById('clock-play-btn');
  const slider = document.getElementById('clock-slider');
  const sliderLabel = document.getElementById('clock-slider-label');

  if (clockPowerOn) {
    // 开 — 默认 12:00，暂停状态
    clockCurrentSpeed = 1;
    const initTime = '12:00';
    const initMins = 720;
    knob.style.left = '20px';
    btn.style.backgroundColor = '#22c55e';
    body.style.opacity = '1';
    body.style.pointerEvents = 'auto';
    playBtn.classList.remove('hidden');
    playBtn.textContent = '▶';
    slider.classList.remove('hidden');
    sliderLabel.classList.remove('hidden');
    slider.value = initMins;
    clockFetch('POST', '/api/clock/speed', {speed: 1}).catch(() => {});
    clockFetch('POST', '/api/clock/init', {
      initial_time: initTime,
      schedule_nodes: []
    }).catch(() => {});
    clockUpdateUI({virtual_time: initTime, is_running: false, speed: 1});
  } else {
    // 关
    knob.style.left = '3px';
    btn.style.backgroundColor = '#374151';
    body.style.opacity = '0.4';
    body.style.pointerEvents = 'none';
    playBtn.classList.add('hidden');
    slider.classList.add('hidden');
    sliderLabel.classList.add('hidden');
    clockFetch('POST', '/api/clock/stop').catch(() => {});
    updateRealTimeDisplay();
  }
}

function clockTogglePlay() {
  const playBtn = document.getElementById('clock-play-btn');
  if (playBtn.textContent === '▶') {
    // 继续 — 以当前倍率启动
    clockFetch('POST', '/api/clock/start').then(data => {
      clockUpdateUI({...data, is_running: true});
      playBtn.textContent = '⏸';
      clockLogEvent('▶ 自动走时已继续', 'info');
    }).catch(() => {});
  } else {
    // 暂停
    clockStop();
    playBtn.textContent = '▶';
  }
}

function clockSliderPreview(val) {
  const mins = parseInt(val);
  const hh = String(Math.floor(mins / 60)).padStart(2,'0');
  const mm = String(mins % 60).padStart(2,'0');
  document.getElementById('clock-display').textContent = hh + ':' + mm;
}

function clockSliderChange(val) {
  const mins = parseInt(val);
  const hh = String(Math.floor(mins / 60)).padStart(2,'0');
  const mm = String(mins % 60).padStart(2,'0');
  const target = hh + ':' + mm;
  clockFetch('POST', '/api/clock/jump', {target}).then(data => {
    if (data.status === 'SUCCESS') {
      clockUpdateUI(data);
      clockLogEvent('🎚️ 拖动到 ' + target, 'info');
      if (data.triggered_nodes && data.triggered_nodes.length) {
        data.triggered_nodes.forEach(ev => {
          clockLogEvent('🔄 [' + ev.time + '] ' + (ev.name || ev.type || '事件'), 'event');
        });
      }
    }
    clockFetch('GET', '/api/clock/events').then(ed => {
      if (ed.events && ed.events.length) {
        ed.events.forEach(e => clockLogEvent('📡 ' + JSON.stringify(e), 'alert'));
      }
    });
  });
}

function updateRealTimeDisplay() {
  const display = document.getElementById('clock-display');
  if (display && !clockPowerOn) {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    display.textContent = hh + ':' + mm;
  }
}

// 每秒更新真实时间
setInterval(updateRealTimeDisplay, 1000);

// ======================================================================
// 虚拟时钟 UI
// ======================================================================

async function clockFetch(method, path, body) {
  const opts = {method};
  if (body) {
    opts.headers = {'Content-Type': 'application/json'};
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API_BASE + path, opts);
  return res.json();
}

function clockUpdateUI(data) {
  const display = document.getElementById('clock-display');
  const playBtn = document.getElementById('clock-play-btn');
  const slider = document.getElementById('clock-slider');
  if (data.virtual_time) {
    display.textContent = data.virtual_time;
    // 同步滑块
    if (slider) {
      const parts = data.virtual_time.split(':');
      slider.value = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }
  }
  // 暂停/继续按钮状态
  if (playBtn) {
    playBtn.textContent = data.is_running ? '⏸' : '▶';
  }
  // 更新速度按钮高亮
  const speedBtns = ['speed-1x-btn', 'speed-2x-btn', 'speed-3x-btn'];
  speedBtns.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('border-green-400', 'bg-green-900/30');
  });
  if (data.is_running && data.speed) {
    const speedMap = {2:0, 5:1, 10:2};
    const idx = speedMap[Math.round(data.speed)];
    if (idx !== undefined) {
      const el = document.getElementById(speedBtns[idx]);
      if (el) el.classList.add('border-green-400', 'bg-green-900/30');
    }
  }
}

function clockLogEvent(msg, type) {
  const log = document.getElementById('clock-event-log');
  const placeholder = log.querySelector('.text-gray-500');
  if (placeholder) placeholder.remove();
  const div = document.createElement('div');
  div.className = 'py-1 px-2 rounded-lg ' + (type === 'event' ? 'bg-green-900/20 text-green-300' : type === 'alert' ? 'bg-yellow-900/20 text-yellow-300' : 'bg-gray-800/50 text-gray-300');
  div.textContent = msg;
  log.appendChild(div);
  // 环形缓冲：保留最多 3 条
  while (log.children.length > 3) {
    log.removeChild(log.firstChild);
  }
  log.scrollTop = log.scrollHeight;
}

async function clockFastForward(delta) {
  if (!clockPowerOn) { clockLogEvent('⚠️ 请先开启虚拟时间控制台', 'alert'); return; }
  // 先乐观更新显示（无延迟）
  const display = document.getElementById('clock-display');
  const slider = document.getElementById('clock-slider');
  const curTime = display.textContent;
  const curMins = parseInt(curTime.split(':')[0])*60 + parseInt(curTime.split(':')[1]);
  const newMins = Math.min(1440, curMins + delta);
  const newHh = String(Math.floor(newMins/60)).padStart(2,'0');
  const newMm = String(newMins%60).padStart(2,'0');
  display.textContent = newHh + ':' + newMm;
  slider.value = newMins;
  // 再调后端确认
  const data = await clockFetch('POST', '/api/clock/offset', {delta});
  if (data.status === 'SUCCESS') {
    clockUpdateUI(data);
    clockLogEvent('⏩ 快进 ' + delta + ' 分钟 → ' + data.new_virtual_time, 'info');
    if (data.triggered_nodes && data.triggered_nodes.length) {
      data.triggered_nodes.forEach(ev => {
        const name = ev.name || ev.type || '事件';
        clockLogEvent('🔄 [' + ev.time + '] ' + name, 'event');
      });
    }
  } else {
    clockLogEvent('⚠️ ' + (data.error_message || '快进失败'), 'alert');
  }
  const evData = await clockFetch('GET', '/api/clock/events');
  if (evData.events && evData.events.length) {
    evData.events.forEach(e => clockLogEvent('📡 事件: ' + JSON.stringify(e), 'alert'));
  }
}

async function clockSetSpeed(speed) {
  if (!clockPowerOn) { clockLogEvent('⚠️ 请先开启虚拟时间控制台', 'alert'); return; }
  clockCurrentSpeed = speed;
  const data = await clockFetch('POST', '/api/clock/speed', {speed});
  if (data.status === 'SUCCESS') {
    clockUpdateUI({...data, is_running: data.is_running || false});
    clockLogEvent('🚀 倍速已设为 ' + speed + 'x', 'info');
  } else {
    clockLogEvent('⚠️ 倍速设置失败', 'alert');
  }
}

async function clockStop() {
  if (!clockPowerOn) return;
  const data = await clockFetch('POST', '/api/clock/stop');
  clockUpdateUI({virtual_time: data.virtual_time, is_running: false, speed: 0});
  clockLogEvent('⏹ 自动走时已停止', 'info');
  const playBtn = document.getElementById('clock-play-btn');
  if (playBtn) playBtn.textContent = '▶';
}

async function clockResetSpeed() {
  if (!clockPowerOn) return;
  clockCurrentSpeed = 1;
  await clockFetch('POST', '/api/clock/speed', {speed: 1});
  await clockFetch('POST', '/api/clock/speed', {speed: 1});
  // 清除所有倍速按钮高亮
  document.querySelectorAll('[id^="speed-"]').forEach(el => {
    el.classList.remove('border-green-400', 'bg-green-900/30');
  });
  clockLogEvent('🔁 倍速已重置为 1x（默认）', 'info');
}

async function clockGoto() {
  if (!clockPowerOn) { clockLogEvent('⚠️ 请先开启虚拟时间控制台', 'alert'); return; }
  const input = document.getElementById('clock-goto-input');
  const target = input.value;
  if (!target) return;
  const data = await clockFetch('POST', '/api/clock/jump', {target});
  if (data.status === 'SUCCESS') {
    clockUpdateUI(data);
    clockLogEvent('🎚️ 跳转 → ' + data.new_virtual_time + ' (经过 ' + data.elapsed_minutes + ' 分钟)', 'info');
    if (data.triggered_nodes && data.triggered_nodes.length) {
      data.triggered_nodes.forEach(ev => {
        clockLogEvent('🔄 [' + ev.time + '] ' + (ev.name || ev.type || '事件'), 'event');
      });
    }
  } else {
    clockLogEvent('⚠️ ' + (data.error_message || '跳转失败'), 'alert');
  }
  const evData = await clockFetch('GET', '/api/clock/events');
  if (evData.events && evData.events.length) {
    evData.events.forEach(e => clockLogEvent('📡 事件: ' + JSON.stringify(e), 'alert'));
  }
}

// 轮询自动走时事件（每 2 秒检查一次）
setInterval(async function() {
  if (!clockPowerOn) return;
  const st = await clockFetch('GET', '/api/clock/status');
  clockUpdateUI(st);
  if (st.is_running) {
    const evData = await clockFetch('GET', '/api/clock/events');
    if (evData.events && evData.events.length) {
      evData.events.forEach(e => clockLogEvent('📡 事件: ' + JSON.stringify(e), 'alert'));
    }
  }
}, 1000);

document.addEventListener('DOMContentLoaded', function() {
 bindSearch();
 // 初始化时钟显示（忽略空 session）
 clockFetch('GET', '/api/clock/status').then(data => {
   if (data && data.virtual_time) clockUpdateUI(data);
 }).catch(() => {});
});
