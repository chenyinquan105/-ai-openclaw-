<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>美团智能助手 - 极简排程（Demo 演示版）</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 .meituan-shadow { box-shadow: 0 10px 30px -10px rgba(255, 208, 0, 0.3); }
 .scrollbar-hide::-webkit-scrollbar { display: none; }
 </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans p-4 md:p-8">

 <div class="max-w-5xl flex flex-col lg:flex-row items-start justify-start gap-6 min-h-screen" style="margin-left: calc(50vw - 540px);">

 <!-- 左侧控制台（异常模拟） -->
 <div class="w-full lg:w-72 bg-gray-900 text-gray-100 p-5 rounded-[32px] shadow-2xl border border-gray-800 space-y-5 lg:sticky lg:top-8 flex-shrink-0 z-20">
 <div>
 <h2 class="text-base font-black tracking-wide text-yellow-400 flex items-center gap-2">
 <span>🛠️</span> 异常模拟控制台
 </h2>
 <p class="text-[11px] text-gray-400 mt-1">演示专用：点击下方状态向助手注入实时环境干扰。</p>
 </div>

 <hr class="border-gray-800">

 <div class="space-y-1.5">
 <label class="block text-xs font-bold text-gray-400 tracking-wider">🎯 影响行程节点</label>
 <select id="console-node-select" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-400 transition cursor-pointer">
 <option value="global">整个行程 (全局影响)</option>
 </select>
 </div>

 <div class="space-y-2">
 <label class="block text-xs font-bold text-gray-400 tracking-wider">🚨 注入异常状态</label>
 <div class="grid grid-cols-2 gap-2">
 <button onclick="triggerDemoException('下暴雨', '🌧️ 外部突降暴雨，路面严重积水，预计全部步行节点的转场移动速度将大幅减慢。')" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold py-3 px-2 rounded-xl border border-gray-700 transition flex flex-col items-center justify-center gap-1 text-center">
 <span class="text-xl">🌧️</span>下暴雨
 </button>
 <button onclick="triggerDemoException('餐厅停电', '🔌 目标餐饮商户内部突发电路故障导致停电，厨房设备停摆，预计出餐将严重滞后。')" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold py-3 px-2 rounded-xl border border-gray-700 transition flex flex-col items-center justify-center gap-1 text-center">
 <span class="text-xl">🔌</span>餐厅停电
 </button>
 <button onclick="triggerDemoException('排号异常', '🎫 现场排队叫号系统积压，前方突增大量离线等位订单，商家告知预计等待时间翻倍。')" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold py-3 px-2 rounded-xl border border-gray-700 transition flex flex-col items-center justify-center gap-1 text-center">
 <span class="text-xl">🎫</span>排号异常
 </button>
 <button onclick="triggerDemoException('堵车', '🚗 核心商圈周边干道发生严重交通事故，路段陷入大面积瘫痪，行车接驳耗时将显著拉长。')" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold py-3 px-2 rounded-xl border border-gray-700 transition flex flex-col items-center justify-center gap-1 text-center">
 <span class="text-xl">🚗</span>堵车
 </button>
 </div>
 </div>

 <hr class="border-gray-800">

 <div class="space-y-2">
 <label class="block text-xs font-bold text-gray-400 tracking-wider">✅ 已激活异常面板 (点击撤销)</label>
 <div id="active-exceptions-list" class="space-y-1.5 max-h-48 overflow-y-auto scrollbar-hide text-xs">
 <p class="text-gray-500 italic py-2 text-center">暂无激活的模拟干扰项</p>
 </div>
 </div>
 </div>

 <!-- 中央竖屏 -->
 <div class="w-full max-w-md bg-white shadow-2xl relative rounded-[40px] overflow-hidden flex-shrink-0 border border-gray-200 flex flex-col" id="main-phone-container" style="height: calc(100vh - 32px); max-height: 900px;">

 <!-- 顶部固定：搜索区 -->
 <header class="flex-shrink-0 p-6 bg-white rounded-b-[40px] shadow-sm z-10">
 <div class="flex items-center justify-between mb-4">
 <h1 class="text-2xl font-black italic text-gray-900">Meituan <span class="text-yellow-400">AI</span></h1>
 <div id="plan-widget" class="hidden">
 <div class="bg-yellow-400 text-black font-black text-sm px-5 py-3 rounded-2xl shadow-2xl meituan-shadow cursor-pointer" id="plan-widget-btn" onclick="openExecCover()">
 您的计划
 </div>
 </div>
 </div>
 <div class="flex items-center bg-gray-100 rounded-full px-5 py-3 border-2 border-transparent focus-within:border-yellow-400 transition-all">
 <input type="text" placeholder="输入您的需求" class="bg-transparent border-none outline-none flex-1 text-sm font-medium">
 <div class="bg-yellow-400 p-2 rounded-full shadow-lg cursor-pointer">
 <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
 </div>
 </div>
 </header>

 <!-- 中间滚动区：交互内容 -->
 <main class="flex-1 overflow-y-auto p-6 space-y-8 relative">
 <div id="dynamic-content"></div>

 <div id="conflict-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
 <div class="bg-white mx-4 rounded-[32px] shadow-2xl max-w-sm w-full p-6">
 <div class="text-center mb-6">
 <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
 <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
 </div>
 <h3 class="text-lg font-bold">⏰ 时间冲突</h3>
 <p id="conflict-message" class="text-sm text-gray-600 mt-2"></p>
 </div>
 <div class="flex space-x-3">
 <button onclick="conflictChoice('postpone')" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-2xl hover:bg-gray-200 transition">延后执行</button>
 <button onclick="conflictChoice('accept')" class="flex-1 bg-yellow-400 text-black font-bold py-3 rounded-2xl hover:bg-yellow-300 transition">接受延误</button>
 </div>
 </div>
 </div>

 </main>

 <!-- 异常弹窗 -->
 <div id="demo-exception-modal" class="absolute inset-0 flex items-center justify-center z-50 hidden" style="background: rgba(0,0,0,0.5);">
 <div class="bg-white mx-4 rounded-[32px] shadow-2xl max-w-sm w-full p-6 animate-fade-in">
 <div class="text-center mb-4">
 <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
 <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
 </div>
 <h3 id="demo-exception-title" class="text-lg font-black text-gray-900">🚨 突发异常阻碍</h3>
 <p id="demo-exception-scope" class="text-xs text-yellow-600 font-bold bg-yellow-50 px-3 py-1 rounded-full inline-block mt-2"></p>
 </div>
 <!-- Plan B 方案选择区 -->
 <div id="planb-options" class="space-y-2 mb-4"></div>
 <div class="flex space-x-3">
 <button onclick="closeDemoExceptionModal()" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3.5 rounded-2xl hover:bg-gray-200 transition text-sm">忽略警告</button>
 <button id="planb-execute-btn" onclick="executePlanB()" class="flex-1 bg-gray-900 text-yellow-400 font-black py-3.5 rounded-2xl hover:bg-gray-800 transition text-sm meituan-shadow disabled:opacity-30 disabled:cursor-not-allowed" disabled>确认执行</button>
 </div>
 </div>
 </div>

 <div id="exec-cover" class="hidden z-40" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
 <div id="exec-card" class="w-full h-full bg-white flex flex-col">
 <!-- 顶部固定：返回+结束行程 -->
 <div class="flex-shrink-0 flex items-center justify-between px-4 pt-5 pb-2 bg-white">
 <div class="flex items-center">
 <button onclick="closeExecCover()" class="w-9 h-9 flex items-center justify-center bg-gray-100 rounded-full hover:bg-gray-200 transition">
 <svg class="w-5 h-5 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
 </button>
 <span class="ml-3 text-gray-500 text-sm font-medium">执行计划中...</span>
 </div>
 <button onclick="endTrip()" class="bg-red-500 text-white font-bold text-sm px-4 py-2 rounded-lg hover:bg-red-600 transition">
 结束行程
 </button>
 </div>
 <!-- 中间滚动区：聊天记录+行程安排 -->
 <div class="flex-1 overflow-y-auto px-4 py-6" id="exec-plan-content"></div>
 <!-- 底部固定：输入框+语音 -->
 <div class="flex-shrink-0 bg-white border-t border-gray-200 px-3 py-3 flex items-center space-x-3">
 <div class="flex-1 flex items-center bg-gray-100 rounded-full px-4 py-2.5 border border-gray-200">
 <input type="text" id="exec-chat-input" placeholder="输入消息..." class="flex-1 bg-transparent border-none outline-none text-gray-900 text-sm placeholder-gray-400">
 <button onclick="sendExecMessage()" class="ml-2 text-yellow-500 font-bold text-sm hover:text-yellow-400 transition">发送</button>
 </div>
 <button onclick="alert('语音输入')" class="w-10 h-10 flex-shrink-0 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
 <svg class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"></rect><path d="M5 10v1a7 7 0 0014 0v-1M12 18v4M9 22h6"></path></svg>
 </button>
 </div>
 </div>
 </div>
 </div>
 </div>

<script>
// ======================================================================
// 美团 AI 助手 — 前端交互逻辑
// 不修改 HTML 骨架，只动态渲染数据
// ======================================================================

const API_BASE = '';

// --- DOM 引用 ---
const searchInput = document.querySelector('header input[type="text"]');
const searchBtn = document.querySelector('header .rounded-full + div, header .bg-yellow-400');
const mainEl = document.getElementById('dynamic-content');

// 首屏原始内容（硬编码示例），用户输入后会被动态替换
let firstRun = true;

// --- 状态 ---
let currentPhase = 'init';
let selectedTransport = '步行';

// --- 品类 emoji 映射 ---
const CATEGORY_EMOJI = {
 hair: '💇', pet: '🐶', cafe: '☕',
 restaurant: '🍽️', cinema: '🎬', gym: '💪', laundry: '🧺',
};
const CATEGORY_NAME = {
 hair: '理发', pet: '宠物洗澡', cafe: '咖啡',
 restaurant: '餐饮', cinema: '电影', gym: '健身', laundry: '干洗',
};

// ======================================================================
// 搜索按钮事件
// ======================================================================
function bindSearch() {
 const btn = document.querySelector('header .bg-yellow-400');
 if (btn) {
 btn.onclick = doSearch;
 btn.style.cursor = 'pointer';
 }
 if (searchInput) {
 searchInput.onkeydown = function(e) { if (e.key === 'Enter') doSearch(); };
 }
}

async function doSearch() {
 const text = searchInput ? searchInput.value.trim() : '';
 if (!text) return;

 firstRun = false;

 // 显示加载状态
 mainEl.innerHTML = `
 <div class="p-6 text-center">
 <div class="animate-pulse text-gray-400">
 <svg class="w-8 h-8 mx-auto mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
 <p class="text-sm">正在搜索附近商户...</p>
 </div>
 </div>
 `;

 try {
 const res = await fetch(API_BASE + '/api/start', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({text})
 });
 const data = await res.json();
 if (data.error) { showError(data.error); return; }
 if (data.phase === 'choose_shop') {
 renderCategorySelection(data.categories);
 }
 } catch(e) {
 showError('网络错误: ' + e.message);
 }
}

// ======================================================================
// 阶段: 选择店铺
// ======================================================================
function renderCategorySelection(categories) {
 if (!categories || categories.length === 0) {
 showError('未搜索到相关商户');
 return;
 }

 let html = `
 <section>
 <div class="flex justify-between items-end mb-4">
 <h2 class="text-lg font-bold">请为每个品类选择店铺</h2>
 <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-1 rounded">基于三里屯核心区</span>
 </div>
 `;

 for (const cat of categories) {
 const emoji = CATEGORY_EMOJI[cat.category] || '📍';
 const label = CATEGORY_NAME[cat.category] || cat.label || cat.category;
 const humanTag = cat.shops.some(s => s.human_needed) ? 'HUMAN NEEDED' : 'BACKGROUND';

 html += `
 <div class="mb-6" data-category="${cat.category}">
 <p class="text-xs font-bold text-gray-400 mb-3 tracking-widest">${emoji} ${label} · ${humanTag}</p>
 <div class="flex space-x-4 overflow-x-auto pb-2 scrollbar-hide shop-scroll">
 `;

 for (let i = 0; i < cat.shops.length; i++) {
 const shop = cat.shops[i];
 const selected = i === 0;
 const borderClass = selected ? 'border-yellow-400 meituan-shadow' : 'border-transparent';
 const opacityClass = selected ? '' : 'opacity-60';
 const tag = shop.human_needed ? '' : '<span class="text-[10px] text-blue-500 ml-1 bg-blue-50 px-1 font-bold">可放下即走</span>';

 html += `
 <div class="flex-shrink-0 w-44 bg-white p-4 rounded-3xl border-4 ${borderClass} ${opacityClass} shop-card relative cursor-pointer transition-all"
 data-shop-id="${shop.shop_id}" data-category="${cat.category}" onclick="toggleShopCard(this)">
 ${selected ? '<div class="absolute top-3 right-3 w-5 h-5 bg-yellow-400 rounded-full flex items-center justify-center"><svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg></div>' : ''}
 <h3 class="font-bold text-sm">${shop.name}</h3>
 <div class="flex items-center mt-2">
 <span class="text-yellow-500 text-xs font-bold">★ ${shop.rating}</span>
 <span class="text-[10px] text-gray-400 ml-2">${shop.distance || ''}</span>
 ${tag}
 </div>
 </div>
 `;
 }

 html += `</div></div>`;
 }

 // 行进方式选择
 html += `
 <div class="bg-gray-50 rounded-[32px] p-5 mt-4">
 <p class="text-sm font-bold text-gray-800 mb-3">🚶 选择行进方式</p>
 <div class="grid grid-cols-4 gap-2">
 <div class="transport-option selected bg-yellow-400 text-black font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:scale-95 transition-transform" data-transport="步行" onclick="selectTransport(this)">🚶 步行</div>
 <div class="transport-option bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:bg-gray-300 transition" data-transport="公共交通" onclick="selectTransport(this)">🚌 公共交通</div>
 <div class="transport-option bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:bg-gray-300 transition" data-transport="打车" onclick="selectTransport(this)">🚕 打车</div>
 <div class="transport-option bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:bg-gray-300 transition" data-transport="驾车" onclick="selectTransport(this)">🚗 驾车</div>
 </div>
 </div>
 `;
 // 确认按钮
 html += `
 <button onclick="confirmShopSelection()" class="w-full bg-yellow-400 text-black font-black py-4 rounded-2xl mt-4 hover:scale-95 transition-transform">
 确认选择，继续
 </button>
 </section>
 <div id="time-section"></div>
 <div id="schedule-section"></div>
 `;

 mainEl.innerHTML = html;
 currentPhase = 'choose_shop';
}

// 点击切换卡片选中状态
function selectTransport(el) {
  document.querySelectorAll('.transport-option').forEach(o => {
    o.className = 'transport-option bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:bg-gray-300 transition';
  });
  el.className = 'transport-option selected bg-yellow-400 text-black font-bold py-3 rounded-2xl text-center text-sm cursor-pointer hover:scale-95 transition-transform';
  selectedTransport = el.dataset.transport;
}

function toggleShopCard(el) {
 const category = el.dataset.category;
 // 同品类其他卡片取消选中
 const siblings = document.querySelectorAll(`.shop-card[data-category="${category}"]`);
 siblings.forEach(s => {
 s.classList.remove('border-yellow-400', 'meituan-shadow');
 s.classList.add('border-transparent', 'opacity-60');
 // 移除选中勾
 const check = s.querySelector('.absolute.top-3');
 if (check) check.remove();
 });

 // 当前卡片选中
 el.classList.remove('border-transparent', 'opacity-60');
 el.classList.add('border-yellow-400', 'meituan-shadow');
 if (!el.querySelector('.absolute.top-3')) {
 const div = document.createElement('div');
 div.className = 'absolute top-3 right-3 w-5 h-5 bg-yellow-400 rounded-full flex items-center justify-center';
 div.innerHTML = '<svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>';
 el.appendChild(div);
 }
}

// 确认选店
async function confirmShopSelection() {
 const cards = document.querySelectorAll('.shop-card.border-yellow-400');
 const selections = [];
 cards.forEach(c => {
 selections.push({
 category: c.dataset.category,
 shop_id: c.dataset.shopId
 });
 });

 if (selections.length === 0) {
 showError('请至少选择一家店铺');
 return;
 }

 try {
 const res = await fetch(API_BASE + '/api/choose_shop', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({selections, transport: selectedTransport})
 });
 const data = await res.json();
 if (data.error) { showError(data.error); return; }
 if (data.phase === 'ask_time') {
 renderTimeInput(data);
 }
 } catch(e) {
 showError('网络错误: ' + e.message);
 }
}

// ======================================================================
// 阶段: 时间输入
// ======================================================================
function renderTimeInput(data) {
 let timeHtml = `
 <section class="pt-4">
 <div class="bg-gray-100 rounded-[32px] p-6">
 <h3 class="text-sm font-bold mb-2">⏰ 预计什么时间去？</h3>
 <div class="flex space-x-3">
 <input type="text" id="time-input" placeholder="例如：下午3点 / 明天上午 / 直接回车=现在出发"
 class="flex-1 bg-white rounded-full px-4 py-3 text-sm border-2 border-transparent focus:border-yellow-400 outline-none"
 onkeydown="if(event.key==='Enter') submitTime()">
 <button onclick="submitTime()" class="bg-yellow-400 text-black font-bold px-6 py-3 rounded-full hover:scale-95 transition-transform">确定</button>
 </div>
 </div>
 </section>
 `;

 const timeSection = document.getElementById('time-section');
 if (timeSection) timeSection.innerHTML = timeHtml;
 else {
 const dc = document.getElementById('dynamic-content');
 dc.insertAdjacentHTML('beforeend', timeHtml);
 }

 // 自动聚焦
 setTimeout(() => document.getElementById('time-input')?.focus(), 100);
}

async function submitTime() {
 const timeInput = document.getElementById('time-input');
 const time = timeInput ? timeInput.value.trim() : '';

 try {
 const res = await fetch(API_BASE + '/api/set_time', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({time})
 });
 const data = await res.json();
 if (data.error) { showError(data.error); return; }
 if (data.phase === 'conflict') {
 showConflictModal(data);
 } else if (data.phase === 'done') {
 renderSchedule(data);
 } else if (data.phase === 'error') {
 showError(data.message);
 }
 } catch(e) {
 showError('网络错误: ' + e.message);
 }
}

// ======================================================================
// 阶段: 排程结果
// ======================================================================
function renderSchedule(data) {
 lastScheduleData = data;
 let html = `
 <section class="pb-10">
 <div class="bg-gray-900 rounded-[40px] p-8 text-white shadow-2xl">
 <div class="flex justify-between items-center mb-8">
 <div>
 <h2 class="text-xl font-bold">行程方案</h2>
 <p class="text-xs text-gray-400 mt-1">AI 优化 · 步行方案</p>
 </div>
 <div class="text-right">
 <p class="text-2xl font-black text-yellow-400">${data.departure_time}</p>
 <p class="text-[10px] uppercase tracking-widest text-gray-500">出发时间</p>
 </div>
 </div>

 <div class="space-y-8 relative">
 <div class="absolute left-[11px] top-2 bottom-2 w-[2px] bg-gradient-to-b from-yellow-400 via-blue-400 to-gray-700 opacity-30"></div>
 `;

 // 后端action→真人化文案映射
 const actionLabels = {
 'DEPART': '准备出发',
 'MOVE_AND_EXEC': '', // 从 memo 提取
 'MOVE': '', // 从 memo 提取
 'DROP_TASK': '', // 由 MOVE 合并
 'START_TASK': '', // 由 MOVE 合并
 'PICK_TASK': '取回',
 'WAIT': '等待中',
 'ARRIVE': '到达',
 };

 // 提取店铺名
 function shopName(memo) {
 if (!memo) return '';
 // 匹配 "前往 xxx" 或 "前往执行 xxx" 或 "完成回收: xxx"
 let m = memo.match(/前往(?:执行)?\s*(.+?)(?: —.*)?$/);
 if (m) return m[1];
 m = memo.match(/完成回收:\s*(.+)/);
 if (m) return m[1];
 m = memo.match(/放下物品/);
 if (m) return '← ';
 return memo;
 }

 for (let i = 0; i < data.timeline.length; i++) {
 const item = data.timeline[i];
 let dotColor = 'bg-yellow-400';
 let label = '';
 let subHtml = '';

 if (item.action === 'DEPART') {
 label = '出发';
 dotColor = 'bg-yellow-400';
 } else if (item.action === 'MOVE_AND_EXEC') {
 // "前往 酷迪宠物三里屯店 — 放下物品，开始后台处理" → "前往 酷迪宠物三里屯店"
 const name = shopName(item.memo);
 const hasDrop = item.memo.includes('放下');
 const hasStart = item.memo.includes('人在场');
 const hasPick = item.memo.includes('回收');
 if (hasDrop) {
 label = `去 ${name}`;
 dotColor = 'bg-blue-400';
 } else if (hasPick) {
 label = `取回 ${name}`;
 dotColor = 'bg-green-400';
 } else {
 label = `前往 ${name}`;
 }
 // 子任务行：人需要在场执行的任务
 if (item.sub_task) {
 // 计算结束时间
 let endTime = '';
 if (item.time && item.sub_task.duration_minutes) {
 const parts = item.time.split(':');
 if (parts.length === 2) {
 let h = parseInt(parts[0]), m = parseInt(parts[1]);
 m += item.sub_task.duration_minutes;
 h += Math.floor(m / 60);
 m = m % 60;
 endTime = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
 }
 }
 subHtml = `
 <p class="text-xs text-gray-400 mt-1 flex justify-between">
 <span>── 进行${item.sub_task.action}（预计 ${item.sub_task.duration_minutes} 分钟）</span>
 <span class="text-gray-500">${endTime} 结束</span>
 </p>
 `;
 }
 } else if (item.action === 'PICK_TASK') {
 const name = shopName(item.memo);
 label = `去 ${name} 接回宠物`;
 dotColor = 'bg-green-400';
 } else if (item.action === 'WAIT') {
 label = '等待中';
 dotColor = 'bg-blue-400';
 } else {
 label = item.memo || '';
 if (item.action === 'DROP_TASK' || item.action === 'WAIT') dotColor = 'bg-blue-400';
 else if (item.action === 'PICK_TASK') dotColor = 'bg-green-400';
 }

 html += `
 <div class="flex items-start relative z-10">
 <div class="w-6 h-6 ${dotColor} rounded-full border-4 border-gray-900 flex-shrink-0"></div>
 <div class="ml-6">
 <p class="text-xs text-yellow-400 font-bold">${item.time}</p>
 <p class="text-sm font-bold">${label}</p>
 ${subHtml}
 </div>
 </div>
 `;
 }

 html += `</div><div class="mt-8 space-y-3">
 <div class="flex items-center justify-between text-xs text-gray-500">
 <span>预计总耗时</span>
 <span class="text-white font-bold">${data.total_minutes} 分钟</span>
 </div>
 <button onclick="handleNavigation()" class="w-full bg-yellow-400 text-black font-black py-4 rounded-2xl hover:scale-95 transition-transform">
 执行计划
 </button>
 <button onclick="resetAll()" class="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl hover:bg-gray-200 transition">
 重新搜索
 </button>
 </div></div>
 </section>
 `;

 const scheduleSection = document.getElementById('schedule-section');
 if (scheduleSection) scheduleSection.innerHTML = html;
 else {
 const dc = document.getElementById('dynamic-content');
 dc.insertAdjacentHTML('beforeend', html);
 }

 currentPhase = 'done';

 // 触发更新左侧控制台的目标下拉框节点
 updateConsoleNodes(data);
}

// ======================================================================
// 冲突弹窗
// ======================================================================
function showConflictModal(data) {
 const modal = document.getElementById('conflict-modal');
 const msg = document.getElementById('conflict-message');
 if (modal && msg) {
 msg.innerHTML = data.message || `执行将延误 ${data.delay_minutes || ''} 分钟`;
 modal.classList.remove('hidden');
 }
 currentPhase = 'conflict';
}

async function conflictChoice(choice) {
 const modal = document.getElementById('conflict-modal');
 if (modal) modal.classList.add('hidden');

 try {
 const res = await fetch(API_BASE + '/api/conflict_choice', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({choice})
 });
 const data = await res.json();
 if (data.error) { showError(data.error); return; }
 if (data.phase === 'conflict') {
 showConflictModal(data);
 } else if (data.phase === 'done') {
 renderSchedule(data);
 } else if (data.phase === 'error') {
 showError(data.message);
 }
 } catch(e) {
 showError('网络错误: ' + e.message);
 }
}

// ======================================================================
// 工具函数
// ======================================================================
function showError(msg) {
 mainEl.innerHTML = `
 <div class="p-6 text-center">
 <div class="bg-red-50 border-2 border-red-200 rounded-[32px] p-6">
 <p class="text-red-500 font-bold text-sm">⚠️ ${msg}</p>
 <button onclick="resetAll()" class="mt-4 bg-gray-100 text-gray-700 font-bold px-6 py-3 rounded-2xl hover:bg-gray-200 transition">
 重新开始
 </button>
 </div>
 </div>
 `;
}

async function resetAll() {
 await fetch(API_BASE + '/api/reset', {method: 'POST'});
 location.reload();
}

// ======================================================================
// 执行计划全屏覆盖
// ======================================================================
let execTimelineData = null;

function handleNavigation() {
 // 从当前已渲染的 schedule 中获取数据
 const scheduleSection = document.getElementById('schedule-section');
 if (!scheduleSection) return;
 // 数据已经在 renderSchedule 时存到 window
 openExecCover();
}

let lastScheduleData = null;

// 缓存执行计划内容，避免重复构建
let execContentCache = '';

function openExecCover() {
 const cover = document.getElementById('exec-cover');
 if (!cover) return;
 const content = document.getElementById('exec-plan-content');
 // 用缓存重建内容（不依赖可能被销毁的 DOM）
 if (execContentCache && content) {
 content.innerHTML = execContentCache;
 } else if (content) {
 const scheduleSection = document.getElementById('schedule-section');
 if (scheduleSection && content) {
 content.innerHTML = scheduleSection.innerHTML;
 const btns = content.querySelector('.mt-8.space-y-3');
 if (btns) btns.remove();
 // 追加防踩坑提醒
 if (lastScheduleData && lastScheduleData.pitfall_reminders) {
 let extraHtml = '';
 for (const r of lastScheduleData.pitfall_reminders) {
 extraHtml += `<div class="bg-gray-800 rounded-[32px] p-6 text-white mt-4"><p class="text-sm font-medium">${r.display_text}</p></div>`;
 }
 if (lastScheduleData.pitfall_insights) {
 for (const ins of lastScheduleData.pitfall_insights) {
 extraHtml += `<div class="bg-gray-800 rounded-[32px] p-6 text-white mt-4"><h4 class="text-sm font-bold text-yellow-400 mb-2">${ins.title}</h4><p class="text-xs text-gray-300">${ins.content}</p></div>`;
 }
 }
 content.insertAdjacentHTML('beforeend', extraHtml);
 }
 // 追加触发器按钮
 if (lastScheduleData && lastScheduleData.pitfall_triggers) {
 for (const trig of lastScheduleData.pitfall_triggers) {
 if (trig.ui_manifest && trig.ui_manifest.component_type === 'standard_button') {
 content.insertAdjacentHTML('beforeend', `
 <div class="bg-yellow-50 border border-yellow-300 rounded-[32px] p-5 mt-4">
 <p class="text-sm text-gray-800 font-medium mb-3">${trig.ui_manifest.prompt_text}</p>
 <div class="flex space-x-3">
 <button onclick="executeTrigger('${trig.trigger_id}')" class="flex-1 bg-yellow-400 text-black font-black py-4 rounded-2xl hover:scale-95 transition-transform">
 ${trig.ui_manifest.confirm_label}
 </button>
 <button onclick="dismissTrigger('${trig.trigger_id}')" class="flex-1 bg-gray-100 text-gray-700 font-bold py-4 rounded-2xl hover:bg-gray-200 transition">
 ${trig.ui_manifest.cancel_label || '不需要'}
 </button>
 </div>
 </div>
 `);
 }
 }
 }
 execContentCache = content.innerHTML;
 }
 }
 cover.classList.remove('hidden');
 document.getElementById('plan-widget')?.classList.remove('hidden');
 // 放大动画
 const card = document.getElementById('exec-card');
 if (card) {
 card.style.transition = 'none';
 card.style.transformOrigin = 'center center';
 card.style.transform = 'scale(0.3)';
 card.style.opacity = '0';
 card.offsetHeight;
 card.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease-out';
 card.style.transform = 'scale(1)';
 card.style.opacity = '1';
 }
}

async function executeTrigger(triggerId) {
 try {
 const res = await fetch(API_BASE + '/api/reflect_trigger', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({trigger_id: triggerId})
 });
 const data = await res.json();
 if (data.error) { alert('执行失败: ' + data.error); return; }
 let msg = '✅ 已执行:\n';
 if (data.executed_tools) {
 for (const t of data.executed_tools) {
 msg += `- ${t.tool}: ${t.status}\n`;
 }
 }
 alert(msg);
 } catch(e) {
 alert('网络错误: ' + e.message);
 }
}

function dismissTrigger(triggerId) {
  const cards = document.querySelectorAll('#exec-plan-content .bg-yellow-50');
  cards.forEach(card => {
    const btns = card.querySelectorAll('button');
    for (const btn of btns) {
      if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(triggerId)) {
        card.remove();
        break;
      }
    }
  });
}

function closeExecCover() {
 const cover = document.getElementById('exec-cover');
 const card = document.getElementById('exec-card');
 if (card) {
 card.style.transition = 'transform 0.25s ease-in, opacity 0.2s ease-in';
 card.style.transformOrigin = 'center center';
 card.style.transform = 'scale(0.3)';
 card.style.opacity = '0';
 setTimeout(() => {
 if (cover) cover.classList.add('hidden');
 card.style.transition = 'none';
 card.style.transform = '';
 card.style.opacity = '';
 }, 280);
 } else {
 if (cover) cover.classList.add('hidden');
 }
}

function sendExecMessage() {
 const input = document.getElementById('exec-chat-input');
 if (!input || !input.value.trim()) return;
 alert('发送: ' + input.value.trim());
 input.value = '';
}

function endTrip() {
 closeExecCover();
 // 隐藏"您的计划"挂件
 document.getElementById('plan-widget')?.classList.add('hidden');
 // 清除执行内容缓存，下次新行程重建
 execContentCache = '';
 const content = document.getElementById('exec-plan-content');
 if (content) content.innerHTML = '';
 // 创建居中白色弹窗
 const toast = document.createElement('div');
 toast.className = 'fixed inset-0 z-50 flex items-center justify-center pointer-events-none';
 toast.innerHTML = '<div class="bg-white rounded-[32px] shadow-2xl px-10 py-6 text-center"><p class="text-gray-900 font-bold text-lg">行程结束</p></div>';
 document.body.appendChild(toast);
 // 2秒后渐变消失
 setTimeout(function() {
 toast.style.transition = 'opacity 0.6s ease';
 toast.style.opacity = '0';
 setTimeout(function() {
 toast.remove();
 }, 600);
 }, 2000);
}



// ======================================================================
// 控制台演示异常注入核心逻辑 (新增)
// ======================================================================
let pendingDemoException = null;
let activeExceptions = [];

function updateConsoleNodes(data) {
 const selectEl = document.getElementById('console-node-select');
 if (!selectEl) return;

 // 初始化保留全局节点
 selectEl.innerHTML = '<option value="global">整个行程 (全局影响)</option>';

 if (data && data.timeline) {
 data.timeline.forEach((item, index) => {
 let label = item.memo || item.action;
 // 简短化文案
 if (label.includes(' — ')) label = label.split(' — ')[0];
 if (label.length > 14) label = label.substring(0, 14) + '...';

 const opt = document.createElement('option');
 opt.value = `node_${index}`;
 opt.textContent = `[${item.time}] ${label}`;
 selectEl.appendChild(opt);
 });
 }
}

function getPlanBOptions(type) {
 const options = {
 '排号异常': [
 { id: 'swap_shop', title: '更换同品类店铺 + 一键排号', subtitle: '检索附近同品类评分最高商户，自动更换并排号', emoji: '🔄' },
 { id: 'postpone', title: '延后排号，先去其他节点', subtitle: '将该节点延后，优先执行其他行程', emoji: '⏳' },
 { id: 'cancel_node', title: '取消该节点', subtitle: '从行程中移除该节点', emoji: '❌' }
 ],
 '下暴雨': [
 { id: 'find_shelter', title: '就近找奶茶/咖啡店避雨', subtitle: '推荐附近饮品店暂避，等雨势减弱再出发', emoji: '☕' },
 { id: 'switch_to_taxi', title: '改步行为打车', subtitle: '将后续步行路段切换为打车接驳', emoji: '🚕' },
 { id: 'postpone', title: '暂缓行程', subtitle: '等待雨停后再出发', emoji: '⏳' },
 { id: 'cancel_trip', title: '取消计划', subtitle: '取消整个行程', emoji: '❌' }
 ],
 '餐厅停电': [
 { id: 'swap_shop', title: '更换附近同品类餐厅', subtitle: '检索附近营业中的同品类餐厅替代', emoji: '🔄' },
 { id: 'cancel_node', title: '取消该节点', subtitle: '从行程中移除该节点', emoji: '❌' }
 ],
 '堵车': [
 { id: 'switch_to_walk_metro', title: '改步行/地铁接驳', subtitle: '将后续路段切换为步行或地铁出行', emoji: '🚶' },
 { id: 'reroute', title: '重新规划路线绕行', subtitle: '避开拥堵路段，计算新路线', emoji: '🗺️' },
 { id: 'postpone_departure', title: '延后出发时间', subtitle: '等待交通缓解后再出发', emoji: '⏳' }
 ]
 };
 return options[type] || [
 { id: 'default_b', title: '执行默认 Plan B', subtitle: '由 AI 自动决策最优变轨方案', emoji: '🤖' },
 { id: 'cancel_node', title: '取消该节点', subtitle: '从行程中移除该节点', emoji: '❌' }
 ];
}

let selectedPlanBOption = null;

function triggerDemoException(type, description) {
 const selectEl = document.getElementById('console-node-select');
 const targetScopeText = selectEl ? selectEl.options[selectEl.selectedIndex].text : '整个行程';

 pendingDemoException = {
 id: Date.now(),
 type: type,
 desc: description,
 scope: targetScopeText
 };
 selectedPlanBOption = null;

 const modal = document.getElementById('demo-exception-modal');
 const titleEl = document.getElementById('demo-exception-title');
 const scopeEl = document.getElementById('demo-exception-scope');
 const optionsContainer = document.getElementById('planb-options');
 const executeBtn = document.getElementById('planb-execute-btn');

 if (!modal || !titleEl || !scopeEl || !optionsContainer || !executeBtn) return;

 titleEl.textContent = `🚨 突发异常: ${type}`;
 scopeEl.textContent = `影响范围: ${targetScopeText.split(' ')[0]}`;

 // 渲染方案列表
 const plans = getPlanBOptions(type);
 optionsContainer.innerHTML = '<p class="text-xs font-bold text-gray-500 mb-1">📋 Plan B 智能变轨方案:</p>' +
 plans.map(p => `
 <div class="planb-option bg-gray-50 border border-gray-200 rounded-2xl p-3 cursor-pointer hover:border-yellow-400 hover:bg-yellow-50 transition flex items-start gap-3" data-option-id="${p.id}" onclick="selectPlanBOption(this, '${p.id}')">
 <div class="w-9 h-9 bg-gray-200 rounded-full flex items-center justify-center flex-shrink-0 text-base">${p.emoji}</div>
 <div class="min-w-0 flex-1">
 <p class="text-sm font-bold text-gray-900">${p.title}</p>
 <p class="text-xs text-gray-500 mt-0.5">${p.subtitle}</p>
 </div>
 </div>
 `).join('');

 executeBtn.disabled = true;
 modal.classList.remove('hidden');
}

function selectPlanBOption(el, optionId) {
 document.querySelectorAll('.planb-option').forEach(o => {
 o.classList.remove('border-yellow-400', 'bg-yellow-50');
 o.classList.add('border-gray-200', 'bg-gray-50');
 });
 el.classList.remove('border-gray-200', 'bg-gray-50');
 el.classList.add('border-yellow-400', 'bg-yellow-50');
 selectedPlanBOption = optionId;
 document.getElementById('planb-execute-btn').disabled = false;
}

function closeDemoExceptionModal() {
 const modal = document.getElementById('demo-exception-modal');
 if (modal) modal.classList.add('hidden');
 pendingDemoException = null;
 selectedPlanBOption = null;
}

function executePlanB() {
 if (!pendingDemoException || !selectedPlanBOption) return;
 activeExceptions.push({ ...pendingDemoException });
 renderActiveExceptions();

 const optionLabel = document.querySelector('.planb-option.border-yellow-400 .text-sm.font-bold');
 const label = optionLabel ? optionLabel.textContent : selectedPlanBOption;
 alert(`✅ 已执行 Plan B: [${label}]
针对异常: ${pendingDemoException.type}`);
 closeDemoExceptionModal();
}

function renderActiveExceptions() {
 const listContainer = document.getElementById('active-exceptions-list');
 if (!listContainer) return;

 if (activeExceptions.length === 0) {
 listContainer.innerHTML = '<p class="text-gray-500 italic py-2 text-center">暂无激活的模拟干扰项</p>';
 return;
 }

 listContainer.innerHTML = '';
 activeExceptions.forEach(exc => {
 const div = document.createElement('div');
 div.className = 'bg-red-950/40 border border-red-900/60 text-red-200 p-2.5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-red-900/40 transition group relative';
 div.title = '点击撤销该环境异常';
 div.onclick = () => removeActiveException(exc.id);
 div.innerHTML = `
 <div class="min-w-0 flex-1 pr-2">
 <div class="flex items-center gap-1">
 <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
 <p class="font-bold text-[11px] text-red-300 truncate">${exc.type}</p>
 </div>
 <p class="text-[10px] text-gray-400 truncate mt-0.5 opacity-80">${exc.scope.split(' ')[0]}</p>
 </div>
 <span class="text-gray-500 group-hover:text-red-400 font-bold transition text-xs pl-1 select-none">✕</span>
 `;
 listContainer.appendChild(div);
 });
}

function removeActiveException(id) {
 activeExceptions = activeExceptions.filter(exc => exc.id !== id);
 renderActiveExceptions();
 alert('异常环境干扰已清除，行程重新对齐美团原生规划航线。');
}
